<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ChatGPT DOM Trimmer Options</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .row {
        margin: 14px 0;
      }

      label {
        display: block;
        margin-bottom: 6px;
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: flex-start;
        margin-bottom: 0;
      }

      .checkbox-row input {
        width: auto;
        margin: 0;
      }

      input,
      button {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        font: inherit;
        border-radius: 0;
      }

      #status {
        margin-top: 12px;
        min-height: 1em;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPT DOM Trimmer Options</h1>

    <div class="row">
      <label class="checkbox-row">
        <input id="enabled" type="checkbox" />
        <span>Enabled by default</span>
      </label>
    </div>

    <div class="row">
      <label for="keepCount">Keep newest messages</label>
      <input id="keepCount" type="number" min="1" max="300" />
    </div>

    <div class="row">
      <label for="trimThreshold"
        >Start trimming only after this many messages</label
      >
      <input id="trimThreshold" type="number" min="1" max="500" />
    </div>

    <div class="row">
      <label class="checkbox-row">
        <input id="debug" type="checkbox" />
        <span>Enable debug logging</span>
      </label>
    </div>

    <button id="save">Save</button>
    <div id="status"></div>

    <script src="defaults.js"></script>
    <script src="options.js"></script>
  </body>
</html>
